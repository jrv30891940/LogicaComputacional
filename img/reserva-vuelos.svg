  <rect x="165" y="80" width="70" height="18" rx="4" fill="#1C4E5A" opacity="0.85"/>
  <rect x="165" y="106" width="70" height="55" rx="6" fill="#5FA8D3" opacity="0.35"/>
  <rect x="175" y="115" width="50" height="10" rx="2" fill="#1C4E5A" opacity="0.6"/>
