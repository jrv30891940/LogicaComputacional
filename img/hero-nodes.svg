<svg viewBox="0 0 480 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Ilustración de nodos de servidores conectados en red">
  <defs>
    <linearGradient id="nodeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1C4E5A"/>
      <stop offset="100%" stop-color="#2E7C8A"/>
    </linearGradient>
  </defs>

  <!-- Líneas de conexión entre servidores -->
  <g stroke="#5FA8D3" stroke-width="2" stroke-dasharray="6 6" fill="none" opacity="0.6">
    <path d="M110,120 L240,70"/>
    <path d="M240,70 L380,130"/>
    <path d="M110,120 L150,260"/>
    <path d="M240,70 L240,220"/>
    <path d="M380,130 L340,270"/>
    <path d="M150,260 L240,220"/>
    <path d="M240,220 L340,270"/>
    <path d="M150,260 L200,360"/>
    <path d="M340,270 L280,360"/>
  </g>

  <!-- Servidor 1 -->
  <g transform="translate(110,120)">
    <circle r="34" fill="url(#nodeGradient)"/>
    <rect x="-14" y="-18" width="28" height="36" rx="3" fill="#FFFFFF" opacity="0.9"/>
    <rect x="-10" y="-12" width="20" height="4" rx="1" fill="#1C4E5A"/>
    <rect x="-10" y="-3" width="20" height="4" rx="1" fill="#1C4E5A"/>
    <rect x="-10" y="6" width="20" height="4" rx="1" fill="#1C4E5A"/>
  </g>

  <!-- Servidor 2 (central, mayor jerarquía) -->
  <g transform="translate(240,70)">
    <circle r="42" fill="url(#nodeGradient)"/>
    <rect x="-16" y="-20" width="32" height="40" rx="3" fill="#FFFFFF" opacity="0.9"/>
    <rect x="-11" y="-13" width="22" height="4" rx="1" fill="#1C4E5A"/>
    <rect x="-11" y="-3" width="22" height="4" rx="1" fill="#1C4E5A"/>
    <rect x="-11" y="7" width="22" height="4" rx="1" fill="#1C4E5A"/>
  </g>

  <!-- Servidor 3 -->
  <g transform="translate(380,130)">
    <circle r="34" fill="url(#nodeGradient)"/>
    <rect x="-14" y="-18" width="28" height="36" rx="3" fill="#FFFFFF" opacity="0.9"/>
    <rect x="-10" y="-12" width="20" height="4" rx="1" fill="#1C4E5A"/>
    <rect x="-10" y="-3" width="20" height="4" rx="1" fill="#1C4E5A"/>
    <rect x="-10" y="6" width="20" height="4" rx="1" fill="#1C4E5A"/>
  </g>

  <!-- Servidor 4 -->
  <g transform="translate(150,260)">
    <circle r="30" fill="url(#nodeGradient)"/>
    <rect x="-12" y="-16" width="24" height="32" rx="3" fill="#FFFFFF" opacity="0.9"/>
    <rect x="-8" y="-10" width="16" height="4" rx="1" fill="#1C4E5A"/>
    <rect x="-8" y="-2" width="16" height="4" rx="1" fill="#1C4E5A"/>
    <rect x="-8" y="6" width="16" height="4" rx="1" fill="#1C4E5A"/>
  </g>

  <!-- Servidor 5 -->
  <g transform="translate(240,220)">
    <circle r="30" fill="url(#nodeGradient)"/>
    <rect x="-12" y="-16" width="24" height="32" rx="3" fill="#FFFFFF" opacity="0.9"/>
    <rect x="-8" y="-10" width="16" height="4" rx="1" fill="#1C4E5A"/>
    <rect x="-8" y="-2" width="16" height="4" rx="1" fill="#1C4E5A"/>
    <rect x="-8" y="6" width="16" height="4" rx="1" fill="#1C4E5A"/>
  </g>

  <!-- Servidor 6 -->
  <g transform="translate(340,270)">
    <circle r="30" fill="url(#nodeGradient)"/>
    <rect x="-12" y="-16" width="24" height="32" rx="3" fill="#FFFFFF" opacity="0.9"/>
    <rect x="-8" y="-10" width="16" height="4" rx="1" fill="#1C4E5A"/>
    <rect x="-8" y="-2" width="16" height="4" rx="1" fill="#1C4E5A"/>
    <rect x="-8" y="6" width="16" height="4" rx="1" fill="#1C4E5A"/>
  </g>

  <!-- Indicadores de estado de sincronización (puntos pulsantes) -->
  <circle cx="200" cy="360" r="8" fill="#5FA8D3">
    <animate attributeName="opacity" values="1;0.35;1" dur="2.4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="280" cy="360" r="8" fill="#5FA8D3">
    <animate attributeName="opacity" values="0.35;1;0.35" dur="2.4s" repeatCount="indefinite"/>
  </circle>
</svg>
