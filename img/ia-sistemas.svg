<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Ilustración de un nodo de inteligencia artificial coordinando servidores">
  <g stroke="#5FA8D3" stroke-width="2" stroke-dasharray="5 5" fill="none" opacity="0.7">
    <path d="M200,150 L90,80"/>
    <path d="M200,150 L310,80"/>
    <path d="M200,150 L90,220"/>
    <path d="M200,150 L310,220"/>
  </g>

  <g transform="translate(200,150)">
    <circle r="46" fill="#1C4E5A"/>
    <circle r="46" fill="none" stroke="#5FA8D3" stroke-width="2">
      <animate attributeName="r" values="46;58;46" dur="2.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;0;0.7" dur="2.8s" repeatCount="indefinite"/>
    </circle>
    <path d="M-14,-6 L0,-16 L14,-6 M-14,-6 V10 L0,18 L14,10 V-6" stroke="#FFFFFF" stroke-width="2.5" fill="none" stroke-linejoin="round" stroke-linecap="round"/>
  </g>

  <g fill="#F3F6F7" stroke="#1C4E5A" stroke-width="2">
    <circle cx="90" cy="80" r="24"/>
    <circle cx="310" cy="80" r="24"/>
    <circle cx="90" cy="220" r="24"/>
    <circle cx="310" cy="220" r="24"/>
  </g>
</svg>
